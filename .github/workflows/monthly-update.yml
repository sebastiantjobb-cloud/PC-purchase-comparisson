name: Monthly Reference Update

on:
  schedule:
    - cron: "0 3 1 * *"   # 03:00 UTC on the 1st of every month
  workflow_dispatch:        # also allows manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit refs.json and create releases

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run updater (fetch Webhallen + update refs.json + build)
        run: node update-refs.js

      - name: Commit updated refs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add refs.json
          git diff --staged --quiet || git commit -m "chore: update high-end refs $(date '+%Y-%m')"
          git push

      - name: Create or update GitHub Release with new HTML
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest-build"
          # Delete existing release if present, then recreate
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -f "$TAG"
          git push origin "$TAG" --force
          gh release create "$TAG" \
            "PC-Comparisson-Public.html" \
            --title "PC Comparison Dashboard (auto-updated $(date '+%B %Y'))" \
            --notes "Monthly auto-updated build. Download the HTML file and open it in any browser — no install required." \
            --latest
